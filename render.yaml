services:
  # ClinicHub Web Service (API + React frontend)
  - type: web
    name: clinichub
    runtime: node
    plan: free
    # NODE_ENV is NOT set here so devDeps (Vite) are installed during build
    buildCommand: npm install && cd client && npm install --include=dev && npm run build
    startCommand: NODE_ENV=production npm start
    envVars:
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
