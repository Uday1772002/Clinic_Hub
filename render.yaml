services:
  # ClinicHub Web Service (API + React frontend)
  - type: web
    name: clinichub
    runtime: docker
    plan: free
    # Dockerfile handles the build — client/dist is pre-built and committed
    envVars:
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false # Set to your Render URL, e.g. https://clinic-hub-lcpq.onrender.com
