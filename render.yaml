services:
  # ClinicHub Web Service (API + React frontend)
  - type: web
    name: clinichub
    runtime: node
    plan: free
    # client/dist is pre-built and committed to the repo — no build step needed
    buildCommand: npm install --only=production
    startCommand: NODE_ENV=production npm start
    envVars:
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
